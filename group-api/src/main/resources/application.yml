server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${API_PORT:8081}
  shutdown: graceful

spring:
  application:
    name: javafx-event-handling-group-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5434/javafx_group}
    username: ${POSTGRES_USER:javafx_group}
    password: ${POSTGRES_PASSWORD:local-javafx-only}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  lifecycle:
    timeout-per-shutdown-phase: 10s
  mvc:
    problemdetails:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
